{% set name = "dirent" %}
{% set version = "1.26" %}
{% set sha256 = "a91662ee5243d2dae5aee7ed8527f95097afda517cc5cc7ca2699648a74a419c" %}

package:
  name: {{ name|lower }}
  version: "{{ version }}"

source:
  url: https://github.com/tronkko/dirent/archive/refs/tags/{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  skip: true  # [not win]
  script:
    - if not exist "%LIBRARY_INC%" mkdir "%LIBRARY_INC%"  # [win]
    - copy "include\\dirent.h" "%LIBRARY_INC%\\"          # [win]

test:
  commands:
    - if not exist "%LIBRARY_INC%\\dirent.h" exit 1       # [win]

about:
  home: https://github.com/tronkko/dirent
  license: MIT
  license_file: LICENSE
  summary: Dirent interface for Microsoft Visual Studio

extra:
  recipe-maintainers:
    - jakirkham
    - willend
