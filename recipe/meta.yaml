{% set name = "dirent" %}
{% set version = "1.21" %}
{% set sha256 = "d5558cd419c8d46bdc958064cb97f963d1ea793866414c025906ec15033512ed" %}

package:
  name: {{ name|lower }}
  version: "{{ version }}"

source:
  url: https://github.com/tronkko/dirent/archive/refs/tags/{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 1
  skip: true  # [not win]
  script:
    - if not exist "%LIBRARY_INC%" mkdir "%LIBRARY_INC%"  # [win]
    - copy "include\\dirent.h" "%LIBRARY_INC%\\"          # [win]

test:
  commands:
    - if not exist "%LIBRARY_INC%\\dirent.h" exit 1       # [win]

about:
  home: https://github.com/tronkko/dirent
  license: MIT
  license_file: LICENSE
  summary: Dirent interface for Microsoft Visual Studio

extra:
  recipe-maintainers:
    - jakirkham
    - willend
